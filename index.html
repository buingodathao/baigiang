<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Ứng dụng của tích phân</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- GeoGebra embed API -->
  <script src="https://www.geogebra.org/apps/deployggb.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f7fb;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .applet-box {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 30px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .ggb-container {
      width: 100%;
      height: 520px;
    }

    @media (max-width: 768px) {
      .ggb-container {
        height: 420px;
      }
    }
  </style>
</head>

<body>
  <h1>Ứng dụng của tích phân – Mô phỏng GeoGebra</h1>

  <!-- Applet 1 -->
  <div class="applet-box">
    <h2>1. Thể tích khối tròn xoay quanh Ox</h2>
    <div id="ggb1" class="ggb-container"></div>
  </div>

  <!-- Applet 2 -->
  <div class="applet-box">
    <h2>2. Mặt cắt ống nước chữ thập và chữ T</h2>
    <div id="ggb2" class="ggb-container"></div>
  </div>

  <!-- Applet 3 -->
  <div class="applet-box">
    <h2>3. Thể tích bình hoa 3D</h2>
    <div id="ggb3" class="ggb-container"></div>
  </div>

  <script>
    // ===== APPLET 1 =====
    var params1 = {
      "filename": "Ứng dụng tích phân tính thể tích - Hai hàm số quay quanh Ox.ggb",
      "showToolBar": false,
      "showMenuBar": false,
      "showAlgebraInput": false,
      "enableShiftDragZoom": true,
      "enableRightClick": false,
      "width": "100%",
      "height": 520
    };
    var applet1 = new GGBApplet(params1, true);
    window.addEventListener("load", function() {
      applet1.inject('ggb1');
    });

    // ===== APPLET 2 =====
    var params2 = {
      "filename": "Ứng dụng tích phân - mặt cắt - ống nước hình chữ thập và chữ T.ggb",
      "showToolBar": false,
      "showMenuBar": false,
      "showAlgebraInput": false,
      "enableShiftDragZoom": true,
      "enableRightClick": false,
      "width": "100%",
      "height": 520
    };
    var applet2 = new GGBApplet(params2, true);
    window.addEventListener("load", function() {
      applet2.inject('ggb2');
    });

    // ===== APPLET 3 =====
    var params3 = {
      "filename": "TheTichBinhHoa3D1.ggb",
      "showToolBar": false,
      "showMenuBar": false,
      "showAlgebraInput": false,
      "enableShiftDragZoom": true,
      "enableRightClick": false,
      "width": "100%",
      "height": 520
    };
    var applet3 = new GGBApplet(params3, true);
    window.addEventListener("load", function() {
      applet3.inject('ggb3');
    });
  </script>


    <!-- ===== GeoGebra Applets (bổ sung, giữ nguyên giao diện cũ) ===== -->
<script src="https://www.geogebra.org/apps/deployggb.js"></script>

<!-- Bộ chọn applet (không ảnh hưởng layout cũ) -->
<div style="width:100%;max-width:900px;margin:30px auto;text-align:center;">
  <select id="appletSelector" style="padding:6px 10px;font-size:16px;">
    <option value="1">Mô hình 1: Hai hàm quay quanh Ox</option>
    <option value="2">Mô hình 2: Mặt cắt ống nước</option>
    <option value="3">Mô hình 3: Thể tích bình hoa 3D</option>
  </select>
</div>

<!-- Vùng hiển thị -->
<div style="width:100%;max-width:900px;margin:0 auto 40px auto;">
  <div id="ggb-applet-main"></div>
</div>

<script>
  const appletConfigs = {
    1: {
      width: 900,
      height: 550,
      filename: "Ứng dụng tích phân tính thể tích - Hai hàm số quay quanh Ox.ggb",
      showToolbar: false,
      showMenuBar: false,
      showAlgebraInput: false,
      enableShiftDragZoom: true
    },
    2: {
      width: 900,
      height: 550,
      filename: "Ứng dụng tích phân - mặt cắt - ống nước hình chữ thập và chữ T.ggb",
      showToolbar: false,
      showMenuBar: false,
      showAlgebraInput: false,
      enableShiftDragZoom: true
    },
    3: {
      width: 900,
      height: 550,
      filename: "TheTichBinhHoa3D1.ggb",
      showToolbar: false,
      showMenuBar: false,
      showAlgebraInput: false,
      enableShiftDragZoom: true
    }
  };

  let currentApplet = null;

  function loadApplet(id) {
    if (currentApplet) {
      document.getElementById("ggb-applet-main").innerHTML = "";
    }
    currentApplet = new GGBApplet(appletConfigs[id], true);
    currentApplet.inject("ggb-applet-main");
  }

  window.addEventListener("load", function () {
    loadApplet(1);
    document.getElementById("appletSelector").addEventListener("change", function () {
      loadApplet(this.value);
    });
  });
</script>
</body>
</html>
